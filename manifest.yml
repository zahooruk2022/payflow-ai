---
# PayFlow AI — Cloud Foundry deployment manifest
#
# Before pushing:
#   1. Create the AI service instance (one-time):
#        cf create-service ai-models chat-and-tools-model payflow-ai-chat-tools
#   2. Run ./build.sh
#   3. cf push
#
# Credentials (base URL + API key) are injected automatically via VCAP_SERVICES.
# No cf set-env needed for AI credentials.

applications:
  - name: payflow-ai
    buildpacks:
      - java_buildpack_offline
    path: backend/target/payflow-ai.jar
    instances: 1
    memory: 1G
    disk_quota: 512M

    health-check-type: http
    health-check-http-endpoint: /actuator/health

    services:
      - payflow-ai-chat-tools    # → spring.ai.openai.chat.base-url + api-key

    env:
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
      JAVA_OPTS: >-
        -XX:+UseG1GC
        -XX:MaxRAMPercentage=65.0
        -Djava.security.egd=file:/dev/./urandom

      # Model name is not in the VCAP binding — set it here
      AI_CHAT_MODEL: gpt-oss:20b
