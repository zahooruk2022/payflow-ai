spring:
  application:
    name: payflow-ai

  ai:
    openai:
      # On CF: base-url and api-key are set per-type by GenAiVcapPostProcessor from VCAP_SERVICES.
      # Locally: override with AI_BASE_URL / AI_API_KEY env vars, or edit the defaults below.
      base-url: ${AI_BASE_URL:http://localhost:11434/v1}
      api-key:  ${AI_API_KEY:local}
      chat:
        options:
          model:       ${AI_CHAT_MODEL:gpt-oss:20b}
          temperature: 0.5
          max-tokens:  1024

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.demo.payflowai: DEBUG
    org.springframework.ai: INFO
